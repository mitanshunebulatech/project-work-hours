# .pre-commit-config.yaml
#
# Catches the exact class of mistake that happened with .env.example (a real
# DB password pasted into a file that was supposed to have only placeholders)
# BEFORE it's committed at all — not after it's already on GitHub.
#
# One-time setup (run once per machine, not per repo clone):
#   pip install pre-commit
#   pre-commit install
#
# After that, this runs automatically on every `git commit` — no need to
# remember it. To run it manually against everything already in the repo:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: check-merge-conflict   # blocks committing files that still have <<<<<<< markers in them
      - id: end-of-file-fixer
      - id: trailing-whitespace
